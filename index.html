    background: #f5f7fa;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 22px;
    color: #1a1a2e;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 28px;
  }
  .input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #4a6cf7; }
  button {
    padding: 12px 24px;
    background: #4a6cf7;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  button:hover { background: #3b5de7; }
  button:disabled { background: #a0b4f7; cursor: not-allowed; }
  .result {
    display: none;
    margin-top: 24px;
    padding: 24px;
    background: #f8f9ff;
    border-radius: 12px;
    border: 1px solid #e8ecf4;
  }
  .result.show { display: block; }
  .result .name { font-size: 20px; font-weight: 600; color: #1a1a2e; }
  .result .score {
    font-size: 48px;
    font-weight: 700;
    color: #4a6cf7;
    margin: 12px 0 4px;
  }
  .result .detail { font-size: 13px; color: #999; margin-top: 8px; }
  .error {
    display: none;
    margin-top: 16px;
    padding: 12px;
    background: #fff0f0;
    border-radius: 8px;
    color: #e74c3c;
    font-size: 14px;
  }
  .error.show { display: block; }
  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: #bbb;
  }
  .hint {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 8px;
  }
  /* 简单动画 */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result.show { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

    <button id="queryBtn" onclick="queryGrade()">查询</button>
  </div>

  <div id="error" class="error"></div>

  <div id="result" class="result">

    <div class="detail">

    </div>

</div>

// 学号到成绩的快速映射
const gradeMap = {};
gradeData.forEach(item => {
  gradeMap[item["学号"]] = item;
});

function queryGrade() {
  const id = document.getElementById('studentId').value.trim();
  const resultEl = document.getElementById('result');
  const errorEl = document.getElementById('error');

  resultEl.classList.remove('show');
  errorEl.classList.remove('show');

  if (!id) {
    errorEl.textContent = '请输入学号';
    errorEl.classList.add('show');
    return;
  }

  const found = gradeMap[id];
  if (!found) {
    errorEl.textContent = '未找到该学号，请确认输入正确';
    errorEl.classList.add('show');
    return;
  }

  document.getElementById('studentName').textContent = found["姓名"];
  document.getElementById('studentScore').textContent = found["成绩"];
  document.getElementById('studentClass').textContent = found["班级"];
  document.getElementById('studentCourse').textContent = found["课程"];
  resultEl.classList.add('show');
}

// 回车键查询
document.getElementById('studentId').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') queryGrade();
});
